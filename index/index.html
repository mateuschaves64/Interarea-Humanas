<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <!--Link que vai buscar a imagem do ícone simples para seleciona-lo na guia-->
    <link rel="icon" type="svg" href="/Interarea-Humanas-main/img/icone-guia.svg">
    <title>Placeholder (por enquanto)</title>
</head>

<body>
    <header class="headerCadastro">
        <div class="logo">
            <img src="/img/logo(placeholder).png" alt="Logo da empresa">
        </div>
        <div class="textoCentral">
            <h1>Cadastre suas informações aqui</h1>
        </div>
        <div class="espacoVazio">
            <!-- Espaço vazio para alinhamento. Quando as informações forem preenchidas, esse espaço será ocupado.-->
        </div>
    </header>
    <main>
        <section class="cadastroSection">
            <div id="Esp-nome">
                <label>Nome</label>
                <input type="text" placheolder="Digite o seu nome">
            </div>
            <div id="Esp-email">
                <label>Email</label>
                <input type="email" placheolder="Digite o seu email">
            </div>
            <div class="infosadicionais">
                <div>
                    <label>Qual a sua idade?</label>
                    <input type="number" placeholder="Digite sua idade">
                </div>
                <div>
                    <label>Telefone</label>
                    <input type="number" placeholder="Telefone para contato">
                </div>
                <div class="infosadicionais2">
                    <div>
                        <label>Possui alguma restrição alimmentar?</label>
                        <input type="text" placeholder="Digite sua Restrição alimentar">
                    </div>
                    <div>
                        <label>Que tipo de ambiente você gosta?</label>
                        <input type="text" placeholder="Digite seu tipo de ambiente">
                    </div>
                </div>
                <!-- Para quem acessar esse documento, favor preencha os campos com as informações fornecidas na imagem de referência 1. (07.04.2026)-->
        </section>
    </main>
</body>

</html>
